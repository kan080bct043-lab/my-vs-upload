<!DOCTYPE html>
<html>
<head>
  <title>Simple Portfolio</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background-color: #f0f0f0;
    }

    header {
      background-color: black;
      color: white;
      text-align: center;
      padding: 10px;
    }

    nav {
      background-color: gray;
      text-align: center;
      padding: 10px;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
    }

    section {
      padding: 20px;
    }

    .box {
      background-color: white;
      padding: 10px;
      margin: 10px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid black;
      text-align: center;
      padding: 5px;
    }

    button {
      padding: 5px 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>My Portfolio</h1>
  <p>Student</p>
</header>

<nav>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#calendar">Calendar</a>
</nav>

<section id="about">
  <h2>About Me</h2>
  <div class="box">
    <p>I am a college student learning web development.</p>
  </div>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="box">Project 1</div>
  <div class="box">Project 2</div>
</section>

<section id="calendar">
  <h2>Calendar</h2>
  <button onclick="prevMonth()">Previous</button>
  <button onclick="nextMonth()">Next</button>
  <h3 id="month"></h3>

  <table>
    <thead>
      <tr>
        <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th>
        <th>Thu</th><th>Fri</th><th>Sat</th>
      </tr>
    </thead>
    <tbody id="days"></tbody>
  </table>
</section>

<script>
  let date = new Date();

  function showCalendar() {
    let year = date.getFullYear();
    let month = date.getMonth();

    document.getElementById("month").innerText = date.toLocaleString('default', { month: 'long', year: 'numeric' });

    let firstDay = new Date(year, month, 1).getDay();
    let totalDays = new Date(year, month + 1, 0).getDate();

    let table = "<tr>";

    for (let i = 0; i < firstDay; i++) {
      table += "<td></td>";
    }

    for (let d = 1; d <= totalDays; d++) {
      table += "<td>" + d + "</td>";

      if ((d + firstDay) % 7 == 0) {
        table += "</tr><tr>";
      }
    }

    table += "</tr>";
    document.getElementById("days").innerHTML = table;
  }

  function prevMonth() {
    date.setMonth(date.getMonth() - 1);
    showCalendar();
  }

  function nextMonth() {
    date.setMonth(date.getMonth() + 1);
    showCalendar();
  }

  showCalendar();
</script>

</body>
</html>
